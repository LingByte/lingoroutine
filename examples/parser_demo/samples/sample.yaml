# 示例 YAML 配置文件
app:
  name: "示例应用"
  version: "2.0.0"
  port: 8080
  
database:
  host: "localhost"
  port: 5432
  name: "sample_db"
  user: "admin"
  password: "secret"
  
logging:
  level: "info"
  format: "json"
  output: "stdout"
  
features:
  - authentication
  - authorization
  - rate_limiting
  - monitoring